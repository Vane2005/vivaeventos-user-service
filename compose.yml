services:
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vivaeventos-user-service
    ports:
      - "8081:8080"
    env_file: # Carga el .env
      - .env
    depends_on:
      - postgres
    restart: always

  postgres:
    image: postgres:15
    container_name: user-service-db
    restart: always
    environment:
      POSTGRES_DB: user-db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:

